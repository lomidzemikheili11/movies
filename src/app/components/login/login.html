<div class="shell">
    <app-header class="header"></app-header>

    <div class="auth-box">
        <h2>Sign In</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" formControlName="email" placeholder="example@gmail.com">
                <span class="error-msg" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                    Please enter a valid email address
                </span>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" formControlName="password" placeholder="Enter your password">
                <span class="error-msg"
                    *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid">
                    Password is required
                </span>
            </div>

            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <p class="register-link">
            <a routerLink="/register">Don't have an account already? Sign Up</a>
        </p>
    </div>
</div>
